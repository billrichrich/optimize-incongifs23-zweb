<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
.loading{
display:flex;
gap:12px;
justify-content:center;
align-items:center;
height:100vh;
}

.dot{
width:20px;
height:20px;
background:#217346;
border-radius:50%;
animation:bounce 1.4s infinite ease-in-out both;
}

.dot:nth-child(1){animation-delay:-0.32s;}
.dot:nth-child(2){animation-delay:-0.16s;}
.dot:nth-child(3){animation-delay:0s;}

@keyframes bounce{
0%,80%,100%{transform:scale(0);}
40%{transform:scale(1);}
}

#loader{
display:none;
}
</style>
</head>

<body>

<div id="loader" class="loading">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<script>
